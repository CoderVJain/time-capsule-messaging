databases:
  - name: timecapsule-db
    plan: free
    databaseName: timecapsule
    user: timecapsule_user

services:
  - type: web
    name: timecapsule-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: timecapsule-db
          property: connectionString

  - type: web
    name: timecapsule-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: timecapsule-api
          envVarKey: RENDER_EXTERNAL_URL
