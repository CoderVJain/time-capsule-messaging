<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Capsule Messaging</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface-hover: #22223a;
      --primary: #7c3aed;
      --primary-hover: #6d28d9;
      --accent: #06d6a0;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: #2d2d44;
      --danger: #ef4444;
      --pending: #f59e0b;
      --delivered: #10b981;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 1.5rem 2rem;
      background: linear-gradient(135deg, var(--surface) 0%, #16162b 100%);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header h1 span { font-size: 1.2rem; margin-right: .4rem; }

    #user-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    #user-info span { color: var(--text-muted); font-size: .85rem; }

    .btn {
      padding: .6rem 1.2rem;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: .85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface-hover); color: var(--text); }

    .btn-accent {
      background: var(--accent);
      color: #0f0f1a;
      font-weight: 600;
    }
    .btn-accent:hover { opacity: .9; transform: translateY(-1px); }

    main {
      width: 100%;
      max-width: 800px;
      padding: 2rem;
      flex: 1;
    }

    /* Auth Section */
    #auth-section {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 70vh;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      animation: fadeIn .4s ease;
    }

    .auth-card h2 {
      font-size: 1.4rem;
      margin-bottom: .5rem;
    }

    .auth-card p {
      color: var(--text-muted);
      font-size: .85rem;
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: .4rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .form-group input, .form-group textarea {
      width: 100%;
      padding: .7rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: .9rem;
      transition: border-color .2s;
    }

    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .char-count {
      text-align: right;
      font-size: .75rem;
      color: var(--text-muted);
      margin-top: .25rem;
    }

    .char-count.over { color: var(--danger); }

    .auth-card .btn {
      width: 100%;
      padding: .8rem;
      font-size: .95rem;
      margin-top: .5rem;
    }

    .auth-toggle {
      text-align: center;
      margin-top: 1rem;
      font-size: .85rem;
      color: var(--text-muted);
    }

    .auth-toggle a {
      color: var(--primary);
      cursor: pointer;
      text-decoration: none;
    }

    .auth-toggle a:hover { text-decoration: underline; }

    /* App Section */
    #app-section { display: none; }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .section-header h2 {
      font-size: 1.3rem;
    }

    /* Create Message Form */
    #create-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 2rem;
      display: none;
      animation: slideDown .3s ease;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Messages List */
    .messages-list { display: flex; flex-direction: column; gap: .75rem; }

    .message-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.5rem;
      transition: border-color .2s;
      animation: fadeIn .3s ease;
    }

    .message-card:hover { border-color: var(--primary); }

    .message-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: .6rem;
    }

    .message-card-header .to {
      font-weight: 500;
      font-size: .9rem;
    }

    .status-badge {
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: .25rem .6rem;
      border-radius: 20px;
    }

    .status-pending {
      background: rgba(245, 158, 11, .15);
      color: var(--pending);
    }

    .status-delivered {
      background: rgba(16, 185, 129, .15);
      color: var(--delivered);
    }

    .message-body {
      font-size: .88rem;
      color: var(--text-muted);
      margin-bottom: .6rem;
      line-height: 1.5;
    }

    .message-meta {
      display: flex;
      gap: 1.5rem;
      font-size: .75rem;
      color: var(--text-muted);
    }

    .message-meta span { display: flex; align-items: center; gap: .3rem; }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state p { font-size: .9rem; }

    .alert {
      padding: .75rem 1rem;
      border-radius: 8px;
      font-size: .85rem;
      margin-bottom: 1rem;
      animation: fadeIn .3s ease;
    }

    .alert-error { background: rgba(239,68,68,.15); color: #fca5a5; border: 1px solid rgba(239,68,68,.3); }
    .alert-success { background: rgba(16,185,129,.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,.3); }

    .loading { text-align: center; padding: 2rem; color: var(--text-muted); }

    @media (max-width: 600px) {
      main { padding: 1rem; }
      .auth-card { padding: 1.5rem; }
      header { flex-direction: column; gap: .5rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1><span>⏳</span> Time Capsule</h1>
    <div id="user-info" style="display:none">
      <span id="user-email"></span>
      <button class="btn btn-ghost" onclick="logout()">Logout</button>
    </div>
  </header>

  <main>
    <!-- Auth Section -->
    <div id="auth-section">
      <div class="auth-card">
        <h2 id="auth-title">Welcome Back</h2>
        <p id="auth-subtitle">Sign in to manage your time capsules</p>
        <div id="auth-alert"></div>
        <form id="auth-form" onsubmit="handleAuth(event)">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="auth-email" required placeholder="you@example.com">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="auth-password" required placeholder="••••••••" minlength="6">
          </div>
          <button type="submit" class="btn btn-primary" id="auth-btn">Sign In</button>
        </form>
        <div class="auth-toggle">
          <span id="auth-toggle-text">Don't have an account?</span>
          <a onclick="toggleAuthMode()"><span id="auth-toggle-link">Sign Up</span></a>
        </div>
      </div>
    </div>

    <!-- App Section -->
    <div id="app-section">
      <div class="section-header">
        <h2>Your Messages</h2>
        <button class="btn btn-accent" onclick="toggleCreateForm()">+ New Message</button>
      </div>

      <!-- Create Form -->
      <div id="create-form">
        <div id="create-alert"></div>
        <form onsubmit="createMessage(event)">
          <div class="form-group">
            <label>Recipient Email</label>
            <input type="email" id="msg-recipient" required placeholder="recipient@example.com">
          </div>
          <div class="form-group">
            <label>Message</label>
            <textarea id="msg-body" required placeholder="Write your message for the future..." maxlength="500" oninput="updateCharCount()"></textarea>
            <div class="char-count" id="char-count">0 / 500</div>
          </div>
          <div class="form-group">
            <label>Deliver At</label>
            <input type="datetime-local" id="msg-deliver-at" required>
          </div>
          <div style="display:flex;gap:.5rem;margin-top:.5rem">
            <button type="submit" class="btn btn-primary" style="flex:1">Schedule Message</button>
            <button type="button" class="btn btn-ghost" onclick="toggleCreateForm()">Cancel</button>
          </div>
        </form>
      </div>

      <!-- Messages List -->
      <div id="messages-list" class="messages-list"></div>
    </div>
  </main>

  <script>
    const API_BASE = window.location.origin;
    let token = localStorage.getItem('tc_token');
    let isLoginMode = true;

    // Init
    if (token) {
      showApp();
    }

    function showAlert(containerId, message, type) {
      const el = document.getElementById(containerId);
      el.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
      setTimeout(() => el.innerHTML = '', 4000);
    }

    function toggleAuthMode() {
      isLoginMode = !isLoginMode;
      document.getElementById('auth-title').textContent = isLoginMode ? 'Welcome Back' : 'Create Account';
      document.getElementById('auth-subtitle').textContent = isLoginMode
        ? 'Sign in to manage your time capsules'
        : 'Sign up to start sending time capsules';
      document.getElementById('auth-btn').textContent = isLoginMode ? 'Sign In' : 'Sign Up';
      document.getElementById('auth-toggle-text').textContent = isLoginMode ? "Don't have an account? " : 'Already have an account? ';
      document.getElementById('auth-toggle-link').textContent = isLoginMode ? 'Sign Up' : 'Sign In';
    }

    async function handleAuth(e) {
      e.preventDefault();
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;
      const endpoint = isLoginMode ? '/auth/login' : '/auth/register';

      try {
        const res = await fetch(API_BASE + endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Authentication failed');

        token = data.token;
        localStorage.setItem('tc_token', token);
        localStorage.setItem('tc_email', email);
        showApp();
      } catch (err) {
        showAlert('auth-alert', err.message, 'error');
      }
    }

    function showApp() {
      document.getElementById('auth-section').style.display = 'none';
      document.getElementById('app-section').style.display = 'block';
      document.getElementById('user-info').style.display = 'flex';
      document.getElementById('user-email').textContent = localStorage.getItem('tc_email') || '';
      loadMessages();
    }

    function logout() {
      token = null;
      localStorage.removeItem('tc_token');
      localStorage.removeItem('tc_email');
      document.getElementById('auth-section').style.display = 'flex';
      document.getElementById('app-section').style.display = 'none';
      document.getElementById('user-info').style.display = 'none';
    }

    function toggleCreateForm() {
      const form = document.getElementById('create-form');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    function updateCharCount() {
      const textarea = document.getElementById('msg-body');
      const counter = document.getElementById('char-count');
      const len = textarea.value.length;
      counter.textContent = `${len} / 500`;
      counter.classList.toggle('over', len > 500);
    }

    async function createMessage(e) {
      e.preventDefault();
      const recipient_email = document.getElementById('msg-recipient').value;
      const message = document.getElementById('msg-body').value;
      const deliver_at_local = document.getElementById('msg-deliver-at').value;

      if (!deliver_at_local) return showAlert('create-alert', 'Please set a delivery date', 'error');

      const deliver_at = new Date(deliver_at_local).toISOString();

      try {
        const res = await fetch(API_BASE + '/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token,
          },
          body: JSON.stringify({ recipient_email, message, deliver_at }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to create message');

        showAlert('create-alert', 'Message scheduled successfully!', 'success');
        document.getElementById('msg-recipient').value = '';
        document.getElementById('msg-body').value = '';
        document.getElementById('msg-deliver-at').value = '';
        updateCharCount();
        loadMessages();
      } catch (err) {
        showAlert('create-alert', err.message, 'error');
      }
    }

    async function loadMessages() {
      const container = document.getElementById('messages-list');
      container.innerHTML = '<div class="loading">Loading messages...</div>';

      try {
        const res = await fetch(API_BASE + '/messages', {
          headers: { 'Authorization': 'Bearer ' + token },
        });
        if (res.status === 401) { logout(); return; }
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        const messages = data.data;
        if (!messages || messages.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="icon">📭</div>
              <p>No messages yet. Create your first time capsule!</p>
            </div>`;
          return;
        }

        container.innerHTML = messages.map(m => `
          <div class="message-card">
            <div class="message-card-header">
              <span class="to">To: ${escapeHtml(m.recipient_email)}</span>
              <span class="status-badge status-${m.status}">${m.status}</span>
            </div>
            <div class="message-body">${escapeHtml(m.message)}</div>
            <div class="message-meta">
              <span>📅 Deliver: ${formatDate(m.deliver_at)}</span>
              <span>🕐 Created: ${formatDate(m.created_at)}</span>
              ${m.delivered_at ? `<span>✅ Delivered: ${formatDate(m.delivered_at)}</span>` : ''}
            </div>
          </div>
        `).join('');
      } catch (err) {
        container.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    }

    function formatDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleString();
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
